global:
  domain: argocd.host.local.internal

configs:
  params:
    # Disable TLS di ArgoCD server karena TLS di-handle Istio
    server.insecure: true

  cm:
    kustomize.enabled: "true"
    # Resource tracking via annotation, more reliable than label
    application.resourceTrackingMethod: annotation

  rbac:
    # Hanya admin yang bisa manage apps
    policy.default: role:readonly
    policy.csv: |
      p, role:admin, applications, *, */*, allow
      p, role:admin, clusters, *, *, allow
      p, role:admin, repositories, *, *, allow
      g, argocd-admins, role:admin

server:
  ingress:
    enabled: false # pakai Istio VirtualService

repoServer:
  # Tambah memory sedikit untuk helm template rendering
  resources:
    limits:
      cpu: 500m
      memory: 512Mi
    requests:
      cpu: 100m
      memory: 256Mi

applicationSet:
  enabled: false # tidak dipakai untuk setup ini
notifications:
  enabled: false
